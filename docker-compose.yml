services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
      MARIADB_DATABASE: sa
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    image: zovcc1/backend:latest
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/sa?createDatabaseIfNotExist=true
      SPRING_DATA_REDIS_HOST: redis
    volumes:
      - maven-cache:/root/.m2
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    image: zovcc1/frontend:latest
    ports:
      - "3000:3000"
    volumes:
      - bun-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mariadb-data:
  maven-cache:
  bun-modules:
