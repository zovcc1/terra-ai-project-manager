# App
spring.application.name=terra-backend

# Database (MariaDB)
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/sa}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:sa}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expirationMs=86400000

# WebSocket
spring.websocket.path=/ws

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tryItOutEnabled=false

# Logging
logging.level.com.terra.backend=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# AI (OpenAI example)
ai.openai.api.url=https://api.openai.com/v1/chat/completions
ai.openai.model=gpt-3.5-turbo
ai.openai.timeout=10000

# Scheduling
ai.insights.cron=0 */10 * * * *
ai.pending.cleanup.cron=0 */5 * * * *

# CORS
cors.allowed.origins=http://localhost:3000
