# App
spring.application.name=terra-backend

# Database (MariaDB)
spring.datasource.url=jdbc:mariadb://localhost:3306/sa?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expirationMs=86400000

# WebSocket
spring.websocket.path=/ws

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tryItOutEnabled=false

# Logging
logging.level.com.terra.backend=trace
logging.level.org.springframework.security=trace
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# AI (OpenRouter)
ai.openai.api.url=https://openrouter.ai/api/v1/chat/completions
ai.openai.model=openrouter/owl-alpha
ai.openai.timeout=10000

# Scheduling
ai.insights.cron=0 */10 * * * *
ai.encryption.key=a41abb42f86dd52b1d2ecabdbf4d9d5e
ai.pending.cleanup.cron=0 */5 * * * *

# CORS
cors.allowed.origins=http://localhost:3000

# Redis
spring.redis.host=localhost
spring.redis.port=6379

# Ephemeral token TTLs (ms)
jwt.ephemeral.verifyTtlMs=900000
jwt.ephemeral.resetTtlMs=3600000

# Rate limit
ratelimit.login.maxAttempts=5
ratelimit.login.windowMs=60000
